; ==========================================================
; 0、高优先级规则
; ==========================================================

; 禁用 QUIC（Smart兼容）
ruleset=REJECT,[]DST-PORT,443,udp

; Emby（最高优先级）
ruleset=🎬 emby,[]DOMAIN-SUFFIX,emby3.69yun69.com
ruleset=🎬 emby,https://raw.githubusercontent.com/JBl9527/ios_rule_script/master/rule/Clash/Emby/Emby.list

; ==========================================================
; AI规则（你提供的）
; ==========================================================

ruleset=✨ AI1,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/AI.list
ruleset=✨ AI2,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/AI2.list


; 国内金融直连
ruleset=DIRECT,[]DOMAIN-KEYWORD,10jqka
ruleset=DIRECT,[]DOMAIN-KEYWORD,eastmoney
ruleset=DIRECT,[]DOMAIN-KEYWORD,hexun


; ==========================================================
; 1、规则集
; ==========================================================

ruleset=📘 GitHub,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.list
ruleset=👯‍♂️ TikTok,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.list
ruleset=🙋 Telegram,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.list

ruleset=📀 流媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.list
ruleset=📀 流媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.list
ruleset=📀 流媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disney/Disney.list
ruleset=📀 流媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Spotify/Spotify.list

ruleset=🌍 国外,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Global/Global.list

ruleset=➡️ 国内,[]GEOIP,CN
ruleset=🌍 国外,[]FINAL


; ==========================================================
; 2、策略组
; ==========================================================

; =========================
; AI（核心：家宽优先）
; =========================
custom_proxy_group=✨ AI1`select`[]🏡 家宽-自动`[]新加坡-自动`[]美国-自动`[]所有-自动`[]DIRECT`[]REJECT
custom_proxy_group=✨ AI2`select`[]🏡 家宽-自动`[]新加坡-自动`[]美国-自动`[]所有-自动`[]DIRECT`[]REJECT

; =========================
; 功能分组
; =========================
custom_proxy_group=📘 GitHub`select`[]DIRECT`[]所有-自动`[]美国-自动`[]REJECT
custom_proxy_group=👯‍♂️ TikTok`select`[]所有-自动`[]美国-自动`[]REJECT
custom_proxy_group=🙋 Telegram`select`[]所有-自动`[]香港-自动`[]REJECT
custom_proxy_group=📀 流媒体`select`[]所有-自动`[]香港-自动`[]新加坡-自动`[]REJECT

; =========================
; Emby（禁止日本）
; =========================
custom_proxy_group=🎬 emby`select`[]DIRECT`[]🏡 家宽-自动`[]新加坡-自动`[]香港-自动`[]台湾-自动`[]韩国-自动`[]美国-自动`[]REJECT

; =========================
; 主路由
; =========================
custom_proxy_group=🌍 国外`select`[]所有-自动`[]美国-自动`[]REJECT
custom_proxy_group=➡️ 国内`select`[]DIRECT`[]REJECT


; ==========================================================
; 3、测速组（全部HTTPS）
; ==========================================================

custom_proxy_group=🏡 家宽-自动`url-test`(家宽|住宅|ISP|Residential|Home)`https://www.gstatic.com/generate_204`180,5,100

custom_proxy_group=所有-自动`url-test`.*`https://www.gstatic.com/generate_204`180,5,100

custom_proxy_group=香港-自动`url-test`(香港|HK)`https://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=台湾-自动`url-test`(台湾|TW)`https://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=日本-自动`url-test`(日本|JP)`https://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=新加坡-自动`url-test`(新加坡|SG)`https://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=韩国-自动`url-test`(韩国|KR)`https://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=美国-自动`url-test`(美国|US)`https://www.gstatic.com/generate_204`180,5,100


; ==========================================================
; 4、启用规则
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true
