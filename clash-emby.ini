;====================================================
; 1、规则集（按自上而下顺序匹配，越靠前优先级越高）
;====================================================

;--------------------
; 局域网/防环路（旁路由必备，防止内网流量被代理核心循环处理）
;--------------------
ruleset=🎯 局域网,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Lan/Lan.list
rule=IP-CIDR,192.168.0.0/16,🎯 局域网
rule=IP-CIDR,10.0.0.0/8,🎯 局域网
rule=IP-CIDR,172.16.0.0/12,🎯 局域网
rule=IP-CIDR,127.0.0.0/8,🎯 局域网

;--------------------
; Emby (私有流媒体/NAS相关，优先级提高，防全局误杀)
;--------------------
ruleset=🎬 emby,https://raw.githubusercontent.com/JBl9527/clash/refs/heads/main/Emby.list

;--------------------
; AI (合并为一组，单独处理防封锁，已剔除高风险的港台节点)
;--------------------
ruleset=👽 AI,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/AI.list
ruleset=👽 AI,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/AI2.list

;--------------------
; GitHub & Telegram & TikTok
;--------------------
ruleset=📘 GitHub,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/GitHub/GitHub.list
ruleset=🙋 Telegram,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.list
ruleset=👯‍♂️ TikTok,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.list

;--------------------
; 流媒体
;--------------------
ruleset=📀 流媒体,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/YouTube.list
ruleset=📀 流媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.list
ruleset=📀 流媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/HBO/HBO.list
ruleset=📀 流媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disney/Disney.list
ruleset=📀 流媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.list
ruleset=📀 流媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Spotify/Spotify.list

;--------------------
; 国外代理 (常规翻墙兜底)
;--------------------
ruleset=🌍 国外,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/Check.list
ruleset=🌍 国外,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/Proxy.list
ruleset=🌍 国外,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Global/Global.list

;--------------------
; 国内直连优化（旁路由性能核心，遇到国内IP直接放行，不走最终MATCH）
;--------------------
rule=GEOIP,CN,DIRECT

;--------------------
; 兜底：其余全部直连 (白名单模式)
;--------------------
rule=MATCH,DIRECT


;====================================================
; 2、策略组
;====================================================
custom_proxy_group=🎯 局域网`select`[]DIRECT

; AI组只保留原生解锁率高的地区
custom_proxy_group=👽 AI`select`[]AI原生-自动`[]日本-自动`[]新加坡-自动`[]美国-自动`[]DIRECT`[]REJECT

custom_proxy_group=📘 GitHub`select`[]DIRECT`[]所有-自动`[]港台新韩-自动`[]台日新韩-自动`[]香港-自动`[]台湾-自动`[]日本-自动`[]新加坡-自动`[]韩国-自动`[]美国-自动`[]其他-自动`[]REJECT
custom_proxy_group=👯‍♂️ TikTok`select`[]DIRECT`[]所有-自动`[]台日新韩-自动`[]台湾-自动`[]日本-自动`[]新加坡-自动`[]韩国-自动`[]美国-自动`[]其他-自动`[]REJECT
custom_proxy_group=🙋 Telegram`select`[]DIRECT`[]所有-自动`[]港台新韩-自动`[]台日新韩-自动`[]香港-自动`[]台湾-自动`[]日本-自动`[]新加坡-自动`[]韩国-自动`[]美国-自动`[]其他-自动`[]REJECT
custom_proxy_group=📀 流媒体`select`[]DIRECT`[]所有-自动`[]港台新韩-自动`[]台日新韩-自动`[]香港-自动`[]台湾-自动`[]日本-自动`[]新加坡-自动`[]韩国-自动`[]美国-自动`[]其他-自动`[]REJECT
custom_proxy_group=🎬 emby`select`[]DIRECT`[]所有-自动`[]港台新韩-自动`[]台日新韩-自动`[]香港-自动`[]台湾-自动`[]日本-自动`[]新加坡-自动`[]韩国-自动`[]美国-自动`[]其他-自动`[]REJECT
custom_proxy_group=🌍 国外`select`[]DIRECT`[]所有-自动`[]港台新韩-自动`[]台日新韩-自动`[]香港-自动`[]台湾-自动`[]日本-自动`[]新加坡-自动`[]韩国-自动`[]美国-自动`[]其他-自动`[]REJECT


;====================================================
; 3、节点组
;====================================================
custom_proxy_group=所有-自动`url-test`.*`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=港台新韩-自动`url-test`(香港|HK|Hong Kong|台湾|TW|Taiwan|新加坡|SG|Singapore|韩国|KR|Korea)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=台日新韩-自动`url-test`(台湾|TW|Taiwan|日本|JP|Japan|新加坡|SG|Singapore|韩国|KR|Korea)`http://www.gstatic.com/generate_204`180,5,100

; AI专用的原生解锁地区（严格排除港台）
custom_proxy_group=AI原生-自动`url-test`(日本|JP|Japan|新加坡|SG|Singapore|美国|US|United States)`http://www.gstatic.com/generate_204`180,5,100

custom_proxy_group=香港-自动`url-test`(香港|HK|Hong Kong)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=台湾-自动`url-test`(台湾|TW|Taiwan)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=日本-自动`url-test`(日本|JP|Japan)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=新加坡-自动`url-test`(新加坡|SG|Singapore)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=韩国-自动`url-test`(韩国|KR|Korea)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=美国-自动`url-test`(美国|US|United States)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=其他-自动`url-test`(澳|英|德|法|印|越|俄|荷|瑞|以)`http://www.gstatic.com/generate_204`180,5,100


;====================================================
; 4、启用
;====================================================
enable_rule_generator=true
overwrite_original_rules=true
