; ==========================================================
; 1. 代理策略组设置 (Custom Proxy Groups) - 极致精简版
; ==========================================================

; --- 1.1 地区节点筛选组 ---
custom_proxy_group=🇭🇰 香港节点`select`(港|HK|hk|Hong|hong|🇭🇰)
custom_proxy_group=🇯🇵 日本节点`select`(日|JP|jp|Japan|japan|🇯🇵)
custom_proxy_group=🇸🇬 狮城节点`select`(新|坡|狮城|SG|sg|Singapore|singapore|🇸🇬)
custom_proxy_group=🇺🇲 美国节点`select`(美|US|us|States|America|america|🇺🇸)
custom_proxy_group=🌐 全部节点`select`.*

; --- 1.2 自动测速组 (Url-test) ---
custom_proxy_group=♻️ 自动选择`url-test`(港|HK|日|JP|新|SG|美|US|台|TW|KR|韩|UK|英|RU|俄)`http://cp.cloudflare.com/generate_204`300`20
custom_proxy_group=♻️ 香港自动`url-test`(港|HK|hk|Hong|hong|🇭🇰)`http://cp.cloudflare.com/generate_204`300`20
custom_proxy_group=♻️ 日本自动`url-test`(日|JP|jp|Japan|japan|🇯🇵)`http://cp.cloudflare.com/generate_204`300`20
custom_proxy_group=♻️ 狮城自动`url-test`(新|坡|狮城|SG|sg|Singapore|singapore|🇸🇬)`http://cp.cloudflare.com/generate_204`300`20
custom_proxy_group=♻️ 美国自动`url-test`(美|US|us|States|America|america|🇺🇸)`http://cp.cloudflare.com/generate_204`300`20

; --- 1.3 核心分流组 (仅保留有特殊路由需求的组) ---
custom_proxy_group=🚀 默认代理`select`[]♻️ 自动选择`[]♻️ 香港自动`[]♻️ 日本自动`[]♻️ 狮城自动`[]♻️ 美国自动`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇺🇲 美国节点`[]🌐 全部节点`[]DIRECT
custom_proxy_group=🤖 ChatGPT`select`[]🇺🇲 美国节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🌐 全部节点`[]DIRECT
custom_proxy_group=🎥 NETFLIX`select`[]♻️ 狮城自动`[]♻️ 香港自动`[]♻️ 日本自动`[]♻️ 美国自动`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇺🇲 美国节点`[]🌐 全部节点`[]DIRECT
custom_proxy_group=💶 PayPal`select`[]🇺🇲 美国节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇭🇰 香港节点`[]🌐 全部节点`[]DIRECT
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🚀 默认代理`[]🇺🇲 美国节点`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🌐 全部节点
custom_proxy_group=📈 Binance`select`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇭🇰 香港节点`[]🌐 全部节点`[]DIRECT
custom_proxy_group=🎬 Emby`select`[]DIRECT`[]🚀 默认代理`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇺🇲 美国节点`[]🌐 全部节点

; --- 1.4 兜底组 ---
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 默认代理`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇺🇲 美国节点`[]🌐 全部节点`[]DIRECT


; ==========================================================
; 2. 路由分流规则设置 (Routing Rules)
; ==========================================================

; --- 2.1 自定义最高优先级规则 ---
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
custom_rules=DOMAIN-SUFFIX,qichiyu.com,🚀 默认代理

; 强制拦截 UDP 443，解决油管/谷歌网页版假死转圈问题
custom_rules=AND,((NETWORK,UDP),(DST-PORT,443)),REJECT

; 强制 IP 测试网站走代理
custom_rules=DOMAIN-SUFFIX,ip.sb,🚀 默认代理
custom_rules=DOMAIN-SUFFIX,ipip.net,🚀 默认代理
custom_rules=DOMAIN-SUFFIX,ipify.org,🚀 默认代理
custom_rules=DOMAIN-KEYWORD,whatismyip,🚀 默认代理

; --- 2.2 用户自定义代理规则集 ---
ruleset=🚀 默认代理,https://raw.githubusercontent.com/qichiyuhub/rule/refs/heads/main/rules/proxy.list

; --- 2.3 服务分类规则集 ---

; 【AI 专属：优先被拦截】
ruleset=🤖 ChatGPT,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/AI/AI.list

; 【流媒体与特殊服务：单独策略】
ruleset=🎥 NETFLIX,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=💶 PayPal,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/PayPal.list
ruleset=🍎 Apple,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=📈 Binance,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Binance.list
ruleset=🎬 Emby,https://raw.githubusercontent.com/JBl9527/clash/refs/heads/main/Emby.list

; 【常规海外服务：统一扔给“默认代理”，UI 更干净】
ruleset=🚀 默认代理,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/YouTube.list
ruleset=🚀 默认代理,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Google.list
ruleset=🚀 默认代理,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GitHub.list
ruleset=🚀 默认代理,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/OneDrive.list
ruleset=🚀 默认代理,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=🚀 默认代理,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/TikTok.list
ruleset=🚀 默认代理,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list

; --- 2.4 兜底与国内规则集 ---
ruleset=🚀 默认代理,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaIp.list

; --- 2.5 最终匹配 (Match) ---
custom_rules=MATCH,🐟 漏网之鱼
