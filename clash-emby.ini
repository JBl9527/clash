; ==========================================================
; 1. 代理策略组设置 (Custom Proxy Groups)
; ==========================================================

; --- 1.1 核心智能测速引擎 ---
custom_proxy_group=🚀 智能优选`url-test`(香港|日本|新加坡|美国|台湾|韩国|英国|新西兰|尼日利亚)`http://cp.cloudflare.com/generate_204`300`20
custom_proxy_group=♻️ 亚洲智能`url-test`(香港|日本|新加坡|台湾|韩国)`http://cp.cloudflare.com/generate_204`300`20
custom_proxy_group=♻️ 欧美智能`url-test`(美国|英国|新西兰)`http://cp.cloudflare.com/generate_204`300`20

; 【Emby 专属】优先抓取低延迟的亚太节点
custom_proxy_group=🎬 Emby 优选`url-test`(香港|新加坡|台湾)`http://cp.cloudflare.com/generate_204`300`20

; 【AI/高防网站 专属】高纯净度，仅限各国家宽测速
custom_proxy_group=🤖 AI 专属`url-test`((家宽|ISP|住宅).*(台湾|美国|英国|日本|新加坡))|((台湾|美国|英国|日本|新加坡).*(家宽|ISP|住宅))`http://cp.cloudflare.com/generate_204`300`20

; --- 1.2 场景化调度组 ---
custom_proxy_group=🌐 默认路由`select`[]🚀 智能优选`[]♻️ 亚洲智能`[]♻️ 欧美智能`[]DIRECT
custom_proxy_group=📺 流媒体智能`select`[]🚀 智能优选`[]♻️ 亚洲智能`[]♻️ 欧美智能
; 【交易稳定】安全第一，包含加密货币与外区支付，纯手动不跳IP
custom_proxy_group=💳 交易稳定(切勿跳IP)`select`[]DIRECT`.*
custom_proxy_group=🎬 Emby 智能`select`[]🎬 Emby 优选`[]DIRECT
custom_proxy_group=🍎 苹果智能`select`[]DIRECT`[]🚀 智能优选

; --- 1.3 兜底组 ---
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 智能优选`[]DIRECT


; ==========================================================
; 2. 路由分流规则设置 (Routing Rules)
; ==========================================================

; --- 2.1 拦截与高优规则 ---
; 局域网直连
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list

; 👇 屏蔽 QUIC (UDP 443)，防止 YouTube 等流媒体 UDP 劣化，强制走 TCP
custom_rules=AND,((NETWORK,udp),(DST-PORT,443)),REJECT

; 个人域名与特殊网站
custom_rules=DOMAIN-SUFFIX,qichiyu.com,🌐 默认路由
custom_rules=DOMAIN-SUFFIX,nodeseek.com,🤖 AI 专属
custom_rules=DOMAIN-KEYWORD,nodeseek,🤖 AI 专属

; 👇 你的私人 Emby 域名 (请把 your-emby-domain.com 换成你实际的域名)
; 确保私人服数据稳定走 Emby 策略，不受后续泛域名规则干扰
custom_rules=DOMAIN-SUFFIX,your-emby-domain.com,🎬 Emby 智能

; 【IP 伪装防漏补丁】
custom_rules=DOMAIN-SUFFIX,ip.sb,🚀 智能优选
custom_rules=DOMAIN-SUFFIX,ipip.net,🚀 智能优选
custom_rules=DOMAIN-SUFFIX,ipify.org,🚀 智能优选
custom_rules=DOMAIN-KEYWORD,whatismyip,🚀 智能优选
custom_rules=DOMAIN-KEYWORD,upaiyun,🚀 智能优选
custom_rules=DOMAIN-KEYWORD,upyun,🚀 智能优选

; 👇 【国内金融与A股防风控补丁】(强制直连，防止行情软件断线或账号被锁)
custom_rules=DOMAIN-KEYWORD,10jqka,DIRECT
custom_rules=DOMAIN-KEYWORD,eastmoney,DIRECT
custom_rules=DOMAIN-KEYWORD,cfc108,DIRECT
custom_rules=DOMAIN-KEYWORD,hexun,DIRECT


; --- 2.2 用户自定义与基础规则 ---
ruleset=🌐 默认路由,https://raw.githubusercontent.com/qichiyuhub/rule/refs/heads/main/rules/proxy.list

; --- 2.3 场景化智能分流 ---
ruleset=🤖 AI 专属,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/AI/AI.list

ruleset=📺 流媒体智能,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/YouTube.list
ruleset=📺 流媒体智能,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=📺 流媒体智能,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/TikTok.list

ruleset=💳 交易稳定(切勿跳IP),https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/PayPal.list
ruleset=💳 交易稳定(切勿跳IP),https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Binance.list

ruleset=🍎 苹果智能,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=🎬 Emby 智能,https://raw.githubusercontent.com/JBl9527/clash/refs/heads/main/Emby.list

ruleset=🌐 默认路由,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Google.list
ruleset=🌐 默认路由,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GitHub.list
ruleset=🌐 默认路由,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=🌐 默认路由,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/OneDrive.list
ruleset=🌐 默认路由,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list


; --- 2.4 兜底与国内直连 ---
ruleset=🌐 默认路由,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaIp.list


; --- 2.5 最终匹配 (Match) ---
custom_rules=MATCH,🐟 漏网之鱼
