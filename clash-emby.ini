;====================================================
; 1、规则集 (Rules & Rulesets)
;====================================================

;--------------------
; 局域网/防环路（旁路由必备）
;--------------------
ruleset=🏡 局域网,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Lan/Lan.list
rule=IP-CIDR,192.168.0.0/16,🏡 局域网
rule=IP-CIDR,10.0.0.0/8,🏡 局域网
rule=IP-CIDR,172.16.0.0/12,🏡 局域网
rule=IP-CIDR,127.0.0.0/8,🏡 局域网

;--------------------
; 强制直连/测IP/DDNS
;--------------------
rule=DOMAIN-SUFFIX,ipip.net,🎯 直连放行
rule=DOMAIN-SUFFIX,upaiyun.com,🎯 直连放行
rule=DOMAIN-SUFFIX,ipw.cn,🎯 直连放行
rule=DOMAIN-SUFFIX,3322.net,🎯 直连放行
rule=DOMAIN-SUFFIX,yinghualuo.cn,🎯 直连放行
rule=DOMAIN-SUFFIX,oray.com,🎯 直连放行
rule=DOMAIN,myip.ipip.net,🎯 直连放行

;--------------------
; Emby (私有流媒体/NAS相关)
;--------------------
ruleset=🎬 Emby媒体,https://raw.githubusercontent.com/JBl9527/clash/refs/heads/main/Emby.list

;--------------------
; AI 
;--------------------
ruleset=🧠 AI智脑,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/AI.list
ruleset=🧠 AI智脑,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/AI2.list

;--------------------
; GitHub & Telegram & TikTok
;--------------------
ruleset=🐙 GitHub,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/GitHub/GitHub.list
ruleset=✈️ Telegram,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.list
ruleset=🎵 TikTok,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.list

;--------------------
; 流媒体
;--------------------
ruleset=🍿 国际影视,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/YouTube.list
ruleset=🍿 国际影视,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.list
ruleset=🍿 国际影视,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/HBO/HBO.list
ruleset=🍿 国际影视,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disney/Disney.list
ruleset=🍿 国际影视,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.list
ruleset=🍿 国际影视,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Spotify/Spotify.list

;--------------------
; 国外代理
;--------------------
ruleset=🌐 默认代理,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/Check.list
ruleset=🌐 默认代理,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/Proxy.list
ruleset=🌐 默认代理,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Global/Global.list

;--------------------
; 国内直连优化（旁路由性能核心）
;--------------------
rule=GEOIP,CN,DIRECT

;--------------------
; 兜底：其余全部直连 (白名单模式)
;--------------------
rule=MATCH,DIRECT


;====================================================
; 2、策略组 (Proxy Groups)
;====================================================
custom_proxy_group=🏡 局域网`select`[]DIRECT
custom_proxy_group=🎯 直连放行`select`[]DIRECT

custom_proxy_group=🧠 AI智脑`select`[]✨ AI专属通道`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点`[]DIRECT`[]REJECT
custom_proxy_group=🐙 GitHub`select`[]DIRECT`[]⚡️ 所有节点`[]🌏 亚太节点`[]🐉 亚太多线`[]🇭🇰 香港节点`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇰🇷 韩国节点`[]🇺🇸 美国节点`[]🌍 其他地区`[]REJECT
custom_proxy_group=🎵 TikTok`select`[]DIRECT`[]⚡️ 所有节点`[]🐉 亚太多线`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇰🇷 韩国节点`[]🇺🇸 美国节点`[]🌍 其他地区`[]REJECT
custom_proxy_group=✈️ Telegram`select`[]DIRECT`[]⚡️ 所有节点`[]🌏 亚太节点`[]🐉 亚太多线`[]🇭🇰 香港节点`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇰🇷 韩国节点`[]🇺🇸 美国节点`[]🌍 其他地区`[]REJECT
custom_proxy_group=🍿 国际影视`select`[]DIRECT`[]⚡️ 所有节点`[]🌏 亚太节点`[]🐉 亚太多线`[]🇭🇰 香港节点`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇰🇷 韩国节点`[]🇺🇸 美国节点`[]🌍 其他地区`[]REJECT
custom_proxy_group=🎬 Emby媒体`select`[]DIRECT`[]⚡️ 所有节点`[]🌏 亚太节点`[]🐉 亚太多线`[]🇭🇰 香港节点`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇰🇷 韩国节点`[]🇺🇸 美国节点`[]🌍 其他地区`[]REJECT
custom_proxy_group=🌐 默认代理`select`[]DIRECT`[]⚡️ 所有节点`[]🌏 亚太节点`[]🐉 亚太多线`[]🇭🇰 香港节点`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇰🇷 韩国节点`[]🇺🇸 美国节点`[]🌍 其他地区`[]REJECT


;====================================================
; 3、节点组 (自动测速与地区筛选)
;====================================================
custom_proxy_group=⚡️ 所有节点`url-test`.*`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=🌏 亚太节点`url-test`(香港|HK|Hong Kong|台湾|TW|Taiwan|新加坡|SG|Singapore|韩国|KR|Korea)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=🐉 亚太多线`url-test`(台湾|TW|Taiwan|日本|JP|Japan|新加坡|SG|Singapore|韩国|KR|Korea)`http://www.gstatic.com/generate_204`180,5,100

; AI专用的原生解锁地区（严格排除港台）
custom_proxy_group=✨ AI专属通道`url-test`(日本|JP|Japan|新加坡|SG|Singapore|美国|US|United States)`http://www.gstatic.com/generate_204`180,5,100

custom_proxy_group=🇭🇰 香港节点`url-test`(香港|HK|Hong Kong)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=🇹🇼 台湾节点`url-test`(台湾|TW|Taiwan)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=🇯🇵 日本节点`url-test`(日本|JP|Japan)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=🇸🇬 新加坡节点`url-test`(新加坡|SG|Singapore)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=🇰🇷 韩国节点`url-test`(韩国|KR|Korea)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=🇺🇸 美国节点`url-test`(美国|US|United States)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=🌍 其他地区`url-test`(澳|英|德|法|印|越|俄|荷|瑞|以)`http://www.gstatic.com/generate_204`180,5,100


