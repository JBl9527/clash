# ========================
# Subconverter 纯净版订阅转换模板 (含 TikTok 专线 & 直连优化)
# 特点：去中心化、灵活分流、极致轻量
# ========================

;1、域名组 (Rulesets)
# 特定业务规则
ruleset=🍎 Apple,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Apple/Apple.list
ruleset=🪟 Microsoft,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Microsoft/Microsoft.list
ruleset=🎮 Nvidia,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Nvidia/Nvidia.list
ruleset=🕹️ Games,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Steam/Steam.list
ruleset=🪙 Crypto,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Crypto/Crypto.list

# AI & 媒体规则
ruleset=✨ AI,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/AI.list
ruleset=✨ AI,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/AI2.list
ruleset=👩‍👧‍👦 TikTok,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/TikTok/TikTok.list
ruleset=🎬 Emby,https://raw.githubusercontent.com/JBl9527/clash/refs/heads/main/Emby.list

# 流媒体规则
ruleset=🎥 流媒体,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/YouTube.list
ruleset=🎥 流媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/HBO/HBO.list
ruleset=🎥 流媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.list
ruleset=🎥 流媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disney/Disney.list
ruleset=🎥 流媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.list
ruleset=🎥 流媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Spotify/Spotify.list

# 基础国外与国内规则
ruleset=🌍 国外,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/Check.list
ruleset=🌍 国外,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/Proxy.list
ruleset=🌍 国外,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Global/Global.list
ruleset=➡️ 国内,[]FINAL

;2、策略组（域名组-节点组）
# Apple / Microsoft / Nvidia / Games：直连跑满本地宽带优先，国外备用
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🌍 国外`[]所有-自动`[]香港-自动
custom_proxy_group=🪟 Microsoft`select`[]DIRECT`[]🌍 国外`[]所有-自动`[]香港-自动
custom_proxy_group=🎮 Nvidia`select`[]DIRECT`[]🌍 国外`[]所有-自动`[]香港-自动
custom_proxy_group=🕹️ Games`select`[]DIRECT`[]🌍 国外`[]所有-自动`[]香港-自动

# AI 专用：优先使用美/新/台/日，确保解锁
custom_proxy_group=✨ AI`select`[]美国-自动`[]新加坡-自动`[]台湾-自动`[]日本-自动`[]🏡 家宽-自动`[]🌍 国外`[]所有-自动`[]所有-手动

# TikTok 专用：首选台/新/日/美，【绝对避开香港】
custom_proxy_group=👩‍👧‍👦 TikTok`select`[]台湾-自动`[]新加坡-自动`[]日本-自动`[]美国-自动`[]🏡 家宽-自动`[]所有-自动`[]所有-手动

# Emby 专用：优先香港、新加坡低延迟节点
custom_proxy_group=🎬 Emby`select`[]香港-自动`[]新加坡-自动`[]所有-自动`[]所有-手动`[]DIRECT

# Crypto 加密货币
custom_proxy_group=🪙 Crypto`select`[]🌍 国外`[]香港-自动`[]新加坡-自动`[]所有-自动`[]所有-手动`[]DIRECT

# 流媒体通用
custom_proxy_group=🎥 流媒体`select`[]🌍 国外`[]香港-自动`[]新加坡-自动`[]台湾-自动`[]日本-自动`[]美国-自动`[]所有-自动`[]所有-手动`[]DIRECT

# 兜底：国外与国内
custom_proxy_group=🌍 国外`select`[]所有-自动`[]香港-自动`[]新加坡-自动`[]台湾-自动`[]日本-自动`[]美国-自动`[]所有-手动`[]DIRECT
custom_proxy_group=➡️ 国内`select`[]DIRECT`[]🌍 国外`[]所有-自动`[]所有-手动

;3、节点组 (Regex 抓取过滤节点)
custom_proxy_group=🏡 家宽-自动`url-test`((家宽|ISP|住宅).*(台湾|美国|英国|日本|新加坡))|((台湾|美国|英国|日本|新加坡).*(家宽|ISP|住宅))`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=所有-手动`select`.*
custom_proxy_group=所有-自动`url-test`.*`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=香港-自动`url-test`(广港|香港|HK|Hong Kong|🇭🇰|HongKong)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=台湾-自动`url-test`(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=日本-自动`url-test`(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=新加坡-自动`url-test`(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=韩国-自动`url-test`(广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=美国-自动`url-test`(广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|硅谷|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=其他-自动`url-test`(波|柬|尼|也|克|比|尔|立|冰|秘|耳|利|埃|希|孟|芬|愛|澳|英|德|南|意|法|拿|墨|印|越|俄|瑞|智|荷|比|巴|沙|班|泰|德|烏|以|Australia|Konghwaguk)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=IPv6-自动`url-test`(ipv6|IPV6|IPv6)`http://www.gstatic.com/generate_204`180,5,100

;4、启用规则集
enable_rule_generator=true
overwrite_original_rules=true
