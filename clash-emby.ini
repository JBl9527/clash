; ==========================================================
; 1. 代理策略组设置 (Custom Proxy Groups) - 🌟 黄金标准版
; ==========================================================

; --- 1.1 地区节点收纳组 (极简包容匹配) ---
custom_proxy_group=🇭🇰 香港节点`select`(港|HK|hk|Hong|hong|🇭🇰)
custom_proxy_group=🇯🇵 日本节点`select`(日|JP|jp|Japan|japan|🇯🇵)
custom_proxy_group=🇸🇬 狮城节点`select`(新|坡|狮城|SG|sg|Singapore|singapore|🇸🇬)
custom_proxy_group=🇺🇲 美国节点`select`(美|US|us|States|America|america|🇺🇸)
custom_proxy_group=🌐 全部节点`select`.*

; --- 1.2 全局唯一智能测速 (保留最核心的自动测速功能，防跳 IP) ---
custom_proxy_group=♻️ 自动选择`url-test`(港|HK|日|JP|新|SG|美|US|台|TW|KR|韩|UK|英|RU|俄)`http://cp.cloudflare.com/generate_204`300`20

; --- 1.3 核心场景策略组 (用户 UI 面板展示) ---
custom_proxy_group=🚀 默认代理`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇺🇲 美国节点`[]🌐 全部节点`[]DIRECT
custom_proxy_group=🤖 AI 服务`select`[]🇺🇲 美国节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🌐 全部节点
custom_proxy_group=📺 国际媒体`select`[]🚀 默认代理`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇺🇲 美国节点`[]🌐 全部节点
custom_proxy_group=💬 Telegram`select`[]🚀 默认代理`[]🇸🇬 狮城节点`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]🌐 全部节点
custom_proxy_group=🪟 办公服务`select`[]🚀 默认代理`[]DIRECT`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇺🇲 美国节点
custom_proxy_group=💳 交易加密`select`[]🚀 默认代理`[]🇺🇲 美国节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇭🇰 香港节点
custom_proxy_group=🍎 苹果服务`select`[]DIRECT`[]🚀 默认代理`[]🇺🇲 美国节点`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点
custom_proxy_group=🎬 Emby`select`[]DIRECT`[]🚀 默认代理`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇺🇲 美国节点`[]🌐 全部节点

; --- 1.4 兜底组 ---
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 默认代理`[]♻️ 自动选择`[]DIRECT


; ==========================================================
; 2. 路由分流规则设置 (Routing Rules)
; ==========================================================

; --- 2.1 拦截与高优规则 ---
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
custom_rules=DOMAIN-SUFFIX,qichiyu.com,🚀 默认代理
; 【关键补丁】拦截 UDP 443 解决 YouTube/网页转圈假死
custom_rules=AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
; IP 测试走代理
custom_rules=DOMAIN-SUFFIX,ip.sb,🚀 默认代理
custom_rules=DOMAIN-SUFFIX,ipip.net,🚀 默认代理
custom_rules=DOMAIN-SUFFIX,ipify.org,🚀 默认代理
custom_rules=DOMAIN-KEYWORD,whatismyip,🚀 默认代理

; --- 2.2 用户自定义与基础规则 ---
ruleset=🚀 默认代理,https://raw.githubusercontent.com/qichiyuhub/rule/refs/heads/main/rules/proxy.list

; --- 2.3 场景化分流 (与策略组完美对应) ---
; [AI 组] - 强隔离香港
ruleset=🤖 AI 服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/AI/AI.list

; [流媒体组] - 涵盖油管、网飞、TikTok等大流量应用
ruleset=📺 国际媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/YouTube.list
ruleset=📺 国际媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=📺 国际媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/TikTok.list

; [交易金融组] - 保护资产 IP 稳定
ruleset=💳 交易加密,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/PayPal.list
ruleset=💳 交易加密,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Binance.list

; [办公服务组] - 微软全家桶
ruleset=🪟 办公服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=🪟 办公服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/OneDrive.list

; [专属定制组]
ruleset=💬 Telegram,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=🍎 苹果服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=🎬 Emby,https://raw.githubusercontent.com/JBl9527/clash/refs/heads/main/Emby.list

; [其他海外常规服务走默认代理]
ruleset=🚀 默认代理,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Google.list
ruleset=🚀 默认代理,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GitHub.list

; --- 2.4 兜底与国内直连 ---
ruleset=🚀 默认代理,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaIp.list
custom_rules=MATCH,🐟 漏网之鱼
